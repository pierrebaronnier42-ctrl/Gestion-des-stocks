<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestion Stock Web</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css?v=1.50" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div id="brandLogo" class="brand-logo">GS</div>
        <div>
          <h1>Gestion Stock</h1>
          <p>Inventaires · Commandes · Réceptions</p>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-footer">
        <button id="btnExportJson" class="ghost full">Exporter sauvegarde</button>
        <label class="ghost full file-label">
          Importer sauvegarde
          <input id="importJson" type="file" accept="application/json" hidden />
        </label>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Tableau de bord</h2>
        </div>
        <div id="authbar" class="authbar"></div>
      </header>
      <section id="app" class="content"></section>
    </main>
  </div>

  <div id="modal" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button id="modalClose" class="icon-btn" aria-label="Fermer">×</button>
      </div>
      <form id="modalForm" class="modal-body"></form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=1.50"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js?v=1.50"></script>
  <script>
    setTimeout(() => {
      const app = document.querySelector('#app');
      const nav = document.querySelector('#nav');
      const isStillStatic = app && nav && !app.textContent.trim() && nav.children.length === 0;
      if (!window.__GESTION_STOCK_APP_JS_LOADED || isStillStatic) {
        if (app) {
          app.innerHTML = `
            <div class="card emergency-card">
              <h3>Le logiciel n’a pas chargé correctement</h3>
              <p class="muted">Le fichier app.js ou le cache de l’ancienne version bloque l’accès. Les données ne sont pas supprimées.</p>
              <div class="actions-row">
                <button class="danger" id="clearCacheReload">Vider le cache et recharger</button>
                <button class="secondary" onclick="location.reload()">Recharger simplement</button>
              </div>
              <p class="muted small">Si le problème continue, remplace bien tous les fichiers du ZIP sur GitHub : index.html, app.js, styles.css, sw.js, manifest.json, supabase-config.js et supabase-setup.sql.</p>
            </div>`;
          document.querySelector('#pageTitle').textContent = 'Réparation accès';
          document.querySelector('#clearCacheReload')?.addEventListener('click', async () => {
            try {
              if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(reg => reg.unregister()));
              }
              if (window.caches) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
              }
            } finally {
              location.reload();
            }
          });
        }
      }
    }, 2500);
  </script>
</body>
</html>
